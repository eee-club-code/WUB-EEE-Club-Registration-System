<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WUB EEE Club System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Inter;background:#eef3ff;margin:0;padding:20px;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px}
input,select,button{padding:10px;margin:5px;width:100%}
button{cursor:pointer}
.hidden{display:none}

/* CERTIFICATE A4 */
.certificate-wrapper{
  width:210mm;
  height:297mm;
  background:#fff;
  margin:auto;
}
.certificate{
  border:6px double #0b3b7a;
  height:100%;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.title{font-family:"Playfair Display";text-align:center;font-size:20px;color:#0b3b7a}
.name{font-size:24px;text-align:center;font-weight:700;margin:10px 0}
.small{text-align:center;font-size:14px}
.footer{display:flex;justify-content:space-between;font-size:12px}
</style>
</head>

<body>

<div class="container">

<h2>WUB EEE Registration</h2>

<input id="name" placeholder="Full Name">
<input id="studentId" placeholder="Student ID">
<input id="email" placeholder="Email">

<button onclick="register()">Register</button>

<hr>

<h3>Admin</h3>
<input id="adminEmail" placeholder="Email">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="adminPanel" class="hidden">
  <h3>Members</h3>
  <div id="list"></div>
</div>

</div>

<!-- CERTIFICATE -->
<div id="certArea" class="hidden">
  <div class="certificate-wrapper">
    <div class="certificate" id="cert">
      
      <div>
        <div class="title">WUB EEE CLUB</div>
        <div class="small">Certificate of Membership</div>
      </div>

      <div>
        <div class="name" id="cName"></div>
        <div class="small" id="cId"></div>
        <div id="qrcode"></div>
      </div>

      <div class="footer">
        <div>President</div>
        <div>Advisor</div>
      </div>

    </div>
  </div>

  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="printCert()">Print A4</button>
</div>

<script>
let db = JSON.parse(localStorage.getItem("db")||"[]");

/* REGISTER */
function register(){
  let obj={
    name:document.getElementById("name").value,
    id:document.getElementById("studentId").value,
    email:document.getElementById("email").value
  };
  db.push(obj);
  localStorage.setItem("db",JSON.stringify(db));
  alert("Registered!");
  render();
}

/* LOGIN */
function login(){
  if(document.getElementById("adminEmail").value==="admin" &&
     document.getElementById("adminPass").value==="1234"){
    document.getElementById("adminPanel").classList.remove("hidden");
    render();
  }else alert("Wrong login");
}

/* LIST */
function render(){
  let html="";
  db.forEach((d,i)=>{
    html+=`
      <div>
        ${d.name} (${d.id})
        <button onclick="openCert(${i})">Certificate</button>
      </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

/* CERT */
function openCert(i){
  let d=db[i];
  document.getElementById("certArea").classList.remove("hidden");

  document.getElementById("cName").innerText=d.name;
  document.getElementById("cId").innerText=d.id;

  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"), d.id);
}

/* PDF */
function downloadPDF(){
  const element=document.getElementById("cert");
  html2pdf().set({
    margin:0,
    filename:"certificate.pdf",
    html2canvas:{scale:3},
    jsPDF:{format:"a4"}
  }).from(element).save();
}

/* PRINT */
function printCert(){
  window.print();
}

render();
</script>

</body>
</html>
